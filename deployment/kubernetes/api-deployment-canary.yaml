# ---
# Canary deployment = run a NEW version with fewer replicas (e.g. 1) alongside
# the stable one (2 replicas). Send a small part of traffic to this canary;
# if it looks good, roll out to the main deployment. See deployment/README.md.
# Use the same image tag as your next release, or a separate tag like :canary.
# ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cesar-api-canary
  labels:
    app: cesar-api
    version: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cesar-api
      version: canary
  template:
    metadata:
      labels:
        app: cesar-api
        version: canary
    spec:
      containers:
        - name: api
          image: cesar-api:canary   # Or :latest when testing; switch main to this when ready
          ports:
            - containerPort: 8000
          env:
            - name: CESAR_MODEL_PATH
              value: "/artifacts/model_latest.joblib"
            - name: CESAR_CONTRACT_PATH
              value: "/artifacts/contract_latest.json"
