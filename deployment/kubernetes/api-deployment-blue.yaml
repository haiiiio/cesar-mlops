# ---
# Blue-Green: "Blue" is one of two identical-looking deployments. You run one
# (e.g. blue) in production; when you have a new version, deploy it as "green",
# test it, then switch the Service selector from blue to green. Zero-downtime
# switch. See deployment/README.md.
# ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cesar-api-blue
  labels:
    app: cesar-api
    env: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cesar-api
      env: blue
  template:
    metadata:
      labels:
        app: cesar-api
        env: blue
    spec:
      containers:
        - name: api
          image: cesar-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: CESAR_MODEL_PATH
              value: "/artifacts/model_latest.joblib"
            - name: CESAR_CONTRACT_PATH
              value: "/artifacts/contract_latest.json"
