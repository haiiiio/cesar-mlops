# Local dev: build API and UI; mount artifact_storage for model/contract.
# Run from repo root: docker compose -f deployment/docker-compose.yml up
# API = 1 container (scale with replicas if you want); UI = 1 container.

services:
  api:
    build:
      context: .
      dockerfile: deployment/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - CESAR_MODEL_PATH=/artifacts/model_latest.joblib
      - CESAR_CONTRACT_PATH=/artifacts/contract_latest.json
    volumes:
      - ./artifact_storage:/artifacts:ro
    # Ideas: add healthcheck, resource limits, configmap for paths

  ui:
    build:
      context: .
      dockerfile: deployment/Dockerfile.ui
    ports:
      - "8080:80"
    # Ideas: proxy /api to api:8000 so CESAR_API_BASE can stay /api
    depends_on:
      - api
